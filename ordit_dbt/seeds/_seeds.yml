version: 2

seeds:
  - name: dim_municipi
    description: >
      Dimensio de municipis de la Comunitat Valenciana: codi_ine, nom (valencia), comarca
      i provincia. 542 municipis. Vegeu docs/sources/geografia.md.
    columns:
      - name: codi_ine
        tests:
          - not_null
          - unique
      - name: nom
        tests:
          - not_null
      - name: provincia
        tests:
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]

  - name: xwalk_cp_ine
    description: Crosswalk codi postal -> codi INE (GeoNames, CC BY 4.0). Via 1 de resolucio.
    columns:
      - name: postal_code
        tests:
          - not_null
          - unique

  - name: dim_us_sigpac
    description: >
      Dimensio dels usos del sol de SIGPAC (llista tancada de l'ICV): codi_us, etiqueta en
      valencia (nom_us) i flag es_agrari (us agrari productiu vs no agrari). 33 codis.
      Vegeu docs/sources/sigpac.md.
    columns:
      - name: codi_us
        tests:
          - not_null
          - unique
      - name: nom_us
        tests:
          - not_null

  - name: xwalk_catastro_ine
    description: >
      Crosswalk codi de municipi de catastro/SIGPAC -> codi INE per als 542 municipis de la
      CV. Font: FEGA, equivalencies INE<->Catastro 2026 (vegeu docs/sources/sigpac.md). 210
      municipis tenen catastro != INE: unir per igualtat assignaria la superficie al
      municipi equivocat.
    columns:
      - name: catastro_code
        tests:
          - not_null
          - unique
      - name: codi_ine
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine

  - name: xwalk_locality
    description: >
      Resolucio aplicada de la cadena MUNICIPIO de FEGA -> codi_ine, amb resolved_by
      (both/cp/name/discrepancy/unresolved). Generat per ingest/geo/build_seeds.py.
    columns:
      - name: municipi_raw
        tests:
          - not_null
          - unique
      - name: resolved_by
        tests:
          - accepted_values:
              arguments:
                values: ["both", "cp", "name", "discrepancy", "unresolved"]
