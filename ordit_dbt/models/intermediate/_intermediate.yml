version: 2

models:
  - name: int_fega
    description: >
      Staging de FEGA amb el grup partit (group_cif, group_name) i el municipi resolt des
      del codi postal. Porta-ho tot (cap filtre per tipus d'entitat). Capa interna.
    columns:
      - name: beneficiary_name
        description: Rao social, nom de persona, o codi anonim ES#... (tal com ve de la font).
        tests:
          - not_null
      - name: financial_year
        description: Exercici financer, injectat des del nom de fitxer.
        tests:
          - not_null

  - name: int_enllac_cooperatives
    description: >
      Enllac determinista FEGA <-> Registre de Cooperatives de la CV. Com el registre
      certifica denominacions uniques, un candidat UNIC (per CIF) es la mateixa entitat:
      confirmat = n_candidats = 1 (siga exacte o nucli aproximat); ambigu = n_candidats > 1.
      metode_enllac (exacte/nucli) registra el COM per a auditoria. Una fila per canonical_key
      amb estat_enllac, cif, clau_registral, metode_enllac, enllac_exacte i n_candidats.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique
      - name: estat_enllac
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["confirmat", "ambigu", "no-match"]

  - name: int_enllac_sat
    description: >
      Enllac determinista FEGA <-> Registre de SAT de la CV. El numero que FEGA encasta al nom
      pot estar mal escrit, aixi que NOM + MUNICIPI son l'autoritat i el numero nomes corrobora.
      Es puntua cada entrada candidata (nom 4 + numero 2 + municipi 1): confirmat = una sola al
      cim; ambigu = empat (>=2). metode_enllac (codi/rescat/nom+municipi/nucli) registra el COM.
      Nomes el subconjunt SAT de FEGA. Una fila per canonical_key amb estat_enllac,
      clau_registral, metode_enllac, enllac_exacte i n_candidats.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique
      - name: estat_enllac
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["confirmat", "ambigu", "no-match"]

  - name: int_enllac
    description: >
      Enllac corporatiu GENERAL: combina cooperatives i SAT en un sol resultat per
      canonical_key (estat_enllac, font_enllac, metode_enllac, clau_registral, cif), triant la
      millor font (confirmat > ambigu; a igualtat, cooperatives perque aporta CIF). Capa interna.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique

  - name: int_sigpac_municipi
    description: >
      Recintes SIGPAC agregats per municipi-catastro, us i grup de cultiu, resolts a
      codi_ine contra dim_municipi (default-deny) i enriquits amb nom de municipi, comarca
      i etiqueta de l'us. Capa interna, no publicada.
    columns:
      - name: catastro_code
        description: Codi de municipi de catastro (provincia 2 + municipi 3).
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE resolt (NULL si el codi de catastro no casa amb dim_municipi).
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: geo_resolved
        description: Estat de la resolucio catastro -> INE (metrica de cobertura).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["matched", "unresolved"]
      - name: land_use
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: surface_m2
        tests:
          - not_null
