version: 2

models:
  - name: int_fega
    description: >
      Staging de FEGA amb el grup partit (group_cif, group_name) i el municipi resolt des
      del codi postal. Porta-ho tot (cap filtre per tipus d'entitat). Capa interna.
    columns:
      - name: beneficiary_name
        description: Rao social, nom de persona, o codi anonim ES#... (tal com ve de la font).
        tests:
          - not_null
      - name: financial_year
        description: Exercici financer, injectat des del nom de fitxer.
        tests:
          - not_null

  - name: int_enllac_cooperatives
    description: >
      Enllac determinista FEGA <-> Registre de Cooperatives de la CV. Com el registre
      certifica denominacions uniques, match = nom canonic EXACTE i candidat UNIC (sense
      municipi); possible = nucli aproximat o exacte ambigu (>1 cooperativa). Una fila per
      canonical_key amb estat_enllac, cif, clau_registral, enllac_exacte i n_candidats.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique
      - name: estat_enllac
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["match", "possible", "no-match"]

  - name: int_enllac_sat
    description: >
      Enllac determinista FEGA <-> Registre de SAT de la CV. El numero de registre es la clau
      unica: match = numero de registre coincident; possible = nucli-SAT del nom (sat_core,
      aproximat) sense numero coincident. Nomes el subconjunt SAT de FEGA. Una fila per
      canonical_key amb estat_enllac, clau_registral (= numero), enllac_exacte i n_candidats.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique
      - name: estat_enllac
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["match", "possible", "no-match"]

  - name: int_enllac
    description: >
      Enllac corporatiu GENERAL: combina cooperatives i SAT en un sol resultat per
      canonical_key (estat_enllac, font_enllac, clau_registral, cif), triant la millor font
      (match > possible; a igualtat, cooperatives perque aporta CIF). Capa interna.
    columns:
      - name: canonical_key
        tests:
          - not_null
          - unique

  - name: int_sigpac_municipi
    description: >
      Recintes SIGPAC agregats per municipi-catastro, us i grup de cultiu, resolts a
      codi_ine contra dim_municipi (default-deny) i enriquits amb nom de municipi, comarca
      i etiqueta de l'us. Capa interna, no publicada.
    columns:
      - name: catastro_code
        description: Codi de municipi de catastro (provincia 2 + municipi 3).
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE resolt (NULL si el codi de catastro no casa amb dim_municipi).
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: geo_resolved
        description: Estat de la resolucio catastro -> INE (metrica de cobertura).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["matched", "unresolved"]
      - name: land_use
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: surface_m2
        tests:
          - not_null
