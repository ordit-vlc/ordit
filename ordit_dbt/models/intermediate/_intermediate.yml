version: 2

models:
  - name: int_fega_classified
    description: >
      Staging de FEGA amb el grup partit (group_cif, group_name) i entity_type derivat
      del nom (legal / natural / natural_masked / ambiguous). Capa interna, no publicada.
    columns:
      - name: beneficiary_name
        description: Rao social, nom de persona, o codi anonim ES#...
        tests:
          - not_null
      - name: financial_year
        description: Exercici financer, injectat des del nom de fitxer.
        tests:
          - not_null
      - name: entity_type
        description: Classificacio per forma juridica; mana el tipus d'entitat, no el nom.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["legal", "natural", "natural_masked", "ambiguous"]

  - name: int_sigpac_municipi
    description: >
      Recintes SIGPAC agregats per municipi-catastro, us i grup de cultiu, resolts a
      codi_ine contra dim_municipi (default-deny) i enriquits amb nom de municipi, comarca
      i etiqueta de l'us. Capa interna, no publicada.
    columns:
      - name: catastro_code
        description: Codi de municipi de catastro (provincia 2 + municipi 3).
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE resolt (NULL si el codi de catastro no casa amb dim_municipi).
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: geo_resolved
        description: Estat de la resolucio catastro -> INE (metrica de cobertura).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["matched", "unresolved"]
      - name: land_use
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: surface_m2
        tests:
          - not_null
