version: 2

models:
  - name: mart_ajudes_pac
    description: >
      Ajudes de la PAC a la Comunitat Valenciana, TOTS els receptors (fisiques i
      juridiques), format llarg per fons {FEAGA, FEADER}. Esquema en valencia ASCII. Mode
      privat: cap filtre ni anonimitzacio (vegeu CLAUDE.md). Municipi i comarca resolts des
      del codi postal; els no resolts mantenen codi_postal pero municipi/comarca son NULL.
    columns:
      - name: nom_beneficiari
        description: Nom del beneficiari tal com arriba de FEGA (procedencia preservada).
        tests:
          - not_null
      - name: clau_beneficiari
        description: >
          Clau canonica d'identitat de beneficiari (heuristica, precision-first): plega
          variants de forma juridica/espais de la mateixa entitat. FEGA no porta CIF, aixi
          que es basa en el nom. Vegeu la macro canon_beneficiari i docs/sources/fega.md.
        tests:
          - not_null
      - name: nom_canonic
        description: >
          Etiqueta representativa per clau canonica (variant mes freqüent, desempat per la
          mes completa). Nomes per a mostrar; agrupar es fa per clau_beneficiari.
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE del municipi (NULL si el codi postal no s'ha pogut resoldre).
        # Integritat referencial (#6): cada codi_ine publicat existeix a dim_municipi.
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: municipi
        description: Nom del municipi en valencia (NULL si no resolt).
      - name: comarca
        description: Comarca (NULL si no resolt).
      - name: provincia
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: codi_postal
        description: >
          Codi postal del beneficiari. NULL quan FEGA emmascara el municipi (files de
          persona fisica en municipis xicotets, etiquetades "PPXXX - XXXXX" en origen).
      - name: mesura
        tests:
          - not_null
      - name: import_eur
        description: Import del fons (contribucio europea). Negatius = recuperacions.
        tests:
          - not_null
      - name: fons
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["FEAGA", "FEADER"]
      - name: exercici
        tests:
          - not_null
      - name: estat_enllac
        description: >
          Estat de l'enllac amb el Registre de Cooperatives de la CV (Fase 3, determinista):
          match (clau canonica + municipi), possible (clau igual amb municipi distint o nucli)
          o no-match. Sempre present; mai un enllac dur. Vegeu int_enllac_cooperatives.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["match", "possible", "no-match"]
      - name: cif
        description: >
          CIF de la cooperativa enllacada (NULL si no-match). El premi de l'enllac: FEGA no
          porta CIF. Integritat referencial cap a staging_cooperatives (els NULL s'ignoren).
        tests:
          - relationships:
              arguments:
                to: ref('staging_cooperatives')
                field: cif
      - name: clau_registral
        description: Clau registral de la cooperativa enllacada (NULL si no-match).

  - name: mart_superficie_cultiu_municipi
    description: >
      Superficie SIGPAC per municipi i us del sol a la Comunitat Valenciana (campanya
      2025), en hectarees. Esquema public en valencia ASCII; etiquetes (municipi, us) en
      valencia amb accents. Nomes municipis resolts a codi_ine. Agregat per municipi i us.
      Vegeu docs/sources/sigpac.md.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: codi_us
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: superficie_ha
        description: Superficie total del municipi en eixe us, en hectarees.
        tests:
          - not_null
      - name: provincia
        tests:
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: exercici
        tests:
          - not_null

  - name: mart_pac_x_superficie_municipi
    description: >
      Diners de la PAC (tots els receptors) creuats amb la superficie agraria de SIGPAC,
      per municipi (campanya/exercici 2025). import_eur_per_ha es orientatiu: FEGA atribueix
      l'ajuda al municipi de registre del beneficiari, no a on es la terra (vegeu el cavet al
      model). Una fila per municipi.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: superficie_agraria_ha
        tests:
          - not_null
      - name: import_pac_eur
        description: Suma d'ajuda PAC de tots els receptors al municipi (exercici 2025).
        tests:
          - not_null
      - name: exercici
        tests:
          - not_null
