version: 2

models:
  - name: mart_ajudes_pac_juridiques
    description: >
      Ajudes de la PAC a persones juridiques de la Comunitat Valenciana, format llarg per
      fons {FEAGA, FEADER}. Esquema public en valencia ASCII. Nomes entity_type 'legal':
      cap persona fisica. Municipi i comarca resolts des del codi postal (Fase 2); els no
      resolts mantenen codi_postal pero municipi/comarca son NULL. Vegeu DATA-PROTECTION.md.
    columns:
      - name: nom_beneficiari
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE del municipi (NULL si el codi postal no s'ha pogut resoldre).
        # Integritat referencial (#6): cada codi_ine publicat existeix a dim_municipi.
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: municipi
        description: Nom del municipi en valencia (NULL si no resolt).
      - name: comarca
        description: Comarca (NULL si no resolt).
      - name: provincia
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: codi_postal
        tests:
          - not_null
      - name: mesura
        tests:
          - not_null
      - name: import_eur
        description: Import del fons (contribucio europea). Negatius = recuperacions.
        tests:
          - not_null
      - name: fons
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["FEAGA", "FEADER"]
      - name: exercici
        tests:
          - not_null

  - name: mart_superficie_cultiu_municipi
    description: >
      Superficie SIGPAC per municipi i us del sol a la Comunitat Valenciana (campanya
      2025), en hectarees. Esquema public en valencia ASCII; etiquetes (municipi, us) en
      valencia amb accents. Nomes municipis resolts a codi_ine. Agregat per municipi i us:
      cap dada de parcel.la ni de titular (DATA-PROTECTION.md). Vegeu docs/sources/sigpac.md.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: codi_us
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: superficie_ha
        description: Superficie total del municipi en eixe us, en hectarees.
        tests:
          - not_null
      - name: provincia
        tests:
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: exercici
        tests:
          - not_null

  - name: mart_pac_x_superficie_municipi
    description: >
      Diners de la PAC (NOMES persones juridiques) creuats amb la superficie agraria de
      SIGPAC, per municipi (campanya/exercici 2025). import_eur_per_ha es ajuda de
      juridiques per hectarea agraria total (vegeu el cavet al model i DATA-PROTECTION.md),
      no l'ajuda total. Una fila per municipi.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: superficie_agraria_ha
        tests:
          - not_null
      - name: import_pac_juridiques_eur
        description: Suma d'ajuda PAC de persones juridiques al municipi (exercici 2025).
        tests:
          - not_null
      - name: exercici
        tests:
          - not_null
