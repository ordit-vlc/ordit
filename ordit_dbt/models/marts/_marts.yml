version: 2

models:
  - name: mart_ajudes_pac
    description: >
      Ajudes de la PAC a la Comunitat Valenciana, TOTS els receptors (fisiques i
      juridiques), format llarg per fons {FEAGA, FEADER}. Esquema en valencia ASCII. Mode
      privat: cap filtre ni anonimitzacio (vegeu CLAUDE.md). Municipi i comarca resolts des
      del codi postal; els no resolts mantenen codi_postal pero municipi/comarca son NULL.
    columns:
      - name: nom_beneficiari
        description: Nom del beneficiari tal com arriba de FEGA (procedencia preservada).
        tests:
          - not_null
      - name: clau_beneficiari
        description: >
          Clau canonica d'identitat de beneficiari (heuristica, precision-first): plega
          variants de forma juridica/espais de la mateixa entitat. FEGA no porta CIF, aixi
          que es basa en el nom. Vegeu la macro canon_beneficiari i docs/sources/fega.md.
        tests:
          - not_null
      - name: nom_canonic
        description: >
          Etiqueta representativa per clau canonica (variant mes freqüent, desempat per la
          mes completa). Nomes per a mostrar; agrupar es fa per clau_beneficiari.
        tests:
          - not_null
      - name: codi_ine
        description: Codi INE del municipi (NULL si el codi postal no s'ha pogut resoldre).
        # Integritat referencial (#6): cada codi_ine publicat existeix a dim_municipi.
        tests:
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: municipi
        description: Nom del municipi en valencia (NULL si no resolt).
      - name: comarca
        description: Comarca (NULL si no resolt).
      - name: provincia
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: codi_postal
        description: >
          Codi postal del beneficiari. NULL quan FEGA emmascara el municipi (files de
          persona fisica en municipis xicotets, etiquetades "PPXXX - XXXXX" en origen).
      - name: mesura
        tests:
          - not_null
      - name: import_eur
        description: Import del fons (contribucio europea). Negatius = recuperacions.
        tests:
          - not_null
      - name: fons
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["FEAGA", "FEADER"]
      - name: exercici
        tests:
          - not_null
      - name: estat_enllac
        description: >
          Estat de l'enllac corporatiu (Fase 3, determinista). Un candidat UNIC es la mateixa
          entitat (unicitat de denominacio + CIF): confirmat = n_candidats = 1 (siga exacte,
          codi o nucli aproximat); ambigu = un nom casant amb >1 entitat; no-match = res.
          Sempre present. Vegeu int_enllac.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["confirmat", "ambigu", "no-match"]
      - name: font_enllac
        description: >
          Font del registre on s'ha enllacat: 'cooperatives' o 'sat'; NULL si no-match. Un
          beneficiari casa amb una sola font segons la seua classe. La coherencia amb
          estat_enllac es prova a assert_font_enllac_coherent. NULL si no-match (els NULL
          els ignora accepted_values).
        tests:
          - accepted_values:
              arguments:
                values: ["cooperatives", "sat"]
      - name: metode_enllac
        description: >
          Com s'ha casat l'enllac (traçabilitat per a auditoria, "cap fet sense font traçable").
          Cooperatives: 'exacte' (nom canonic) o 'nucli' (nucli aproximat). SAT (nom + municipi
          son l'autoritat; el numero nomes corrobora): 'codi' (el numero coincideix), 'rescat'
          (FEGA duia un numero erroni i el nom (+municipi) l'ha rescatat), 'nom+municipi' (sense
          numero, casa per nom i municipi) o 'nucli' (sense numero ni municipi, nomes nom). NULL
          si no-match. No es dubte: tot enllac amb candidat unic es confirmat.
        tests:
          - accepted_values:
              arguments:
                values: ["exacte", "codi", "nucli", "rescat", "nom+municipi"]
      - name: cif
        description: >
          CIF de la cooperativa enllacada (NOMES font_enllac='cooperatives'; la SAT no porta
          CIF). NULL altrament. El premi de l'enllac: FEGA no porta CIF. Integritat
          referencial cap a staging_cooperatives (els NULL s'ignoren).
        tests:
          - relationships:
              arguments:
                to: ref('staging_cooperatives')
                field: cif
      - name: clau_registral
        description: >
          Identificador registral de l'entitat enllacada: clau registral (cooperatives) o
          numero de registre (SAT), segons font_enllac. NULL si no-match. Integritat
          referencial de SAT a assert_clau_registral_sat.

  - name: mart_superficie_cultiu_municipi
    description: >
      Superficie SIGPAC per municipi i us del sol a la Comunitat Valenciana (campanya
      2025), en hectarees. Esquema public en valencia ASCII; etiquetes (municipi, us) en
      valencia amb accents. Nomes municipis resolts a codi_ine. Agregat per municipi i us.
      Vegeu docs/sources/sigpac.md.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: codi_us
        description: Codi d'us SIGPAC (llista tancada).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_us_sigpac')
                field: codi_us
      - name: superficie_ha
        description: Superficie total del municipi en eixe us, en hectarees.
        tests:
          - not_null
      - name: nombre_recintes
        description: Nombre de recintes SIGPAC agregats en eixe (municipi, us).
        tests:
          - not_null
      - name: provincia
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: exercici
        tests:
          - not_null

  - name: mart_pac_x_superficie_municipi
    description: >
      Diners de la PAC (tots els receptors) creuats amb la superficie agraria de SIGPAC,
      per municipi (campanya/exercici 2025). import_eur_per_ha es orientatiu: FEGA atribueix
      l'ajuda al municipi de registre del beneficiari, no a on es la terra (vegeu el cavet al
      model). Una fila per municipi.
    columns:
      - name: codi_ine
        description: Codi INE del municipi.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_municipi')
                field: codi_ine
      - name: superficie_agraria_ha
        tests:
          - not_null
      - name: import_pac_eur
        description: Suma d'ajuda PAC de tots els receptors al municipi (exercici 2025).
        tests:
          - not_null
      - name: nombre_beneficiaris
        description: Beneficiaris distints amb ajuda registrada al municipi (0 si cap).
        tests:
          - not_null
      - name: provincia
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Alacant", "Castelló", "València"]
      - name: exercici
        tests:
          - not_null

  - name: mart_concessions_bdns
    description: >
      Concessions de subvencions de la BDNS a la Comunitat Valenciana, TOTS els
      beneficiaris (mode privat, cap filtre ni anonimitzacio). Una fila per concessio.
      Esquema public en valencia ASCII. El premi respecte a FEGA: cada concessio porta el
      NIF/CIF del beneficiari (nif_cif), la clau forta per al backbone d'entitat (Fase 6).
      Vegeu docs/sources/bdns.md.
    columns:
      - name: codi_concessio
        description: Codi de concessio de la BDNS (p. ex. SB..., GR...).
        tests:
          - not_null
          - unique
      - name: data_concessio
        tests:
          - not_null
      - name: exercici
        description: Any de la concessio (extret de data_concessio).
        tests:
          - not_null
      - name: nif_cif
        description: >
          NIF/CIF del beneficiari incrustat a la font ("<NIF/CIF> <NOM>"). NULL nomes si no
          s'ha pogut extraure (mai observat al real). Codis ZZ...Z per a entitats sense NIF
          estandard. La clau forta que FEGA no porta.
      - name: nom_beneficiari
        description: Nom del beneficiari sense el NIF/CIF inicial ni l'artefacte * del nom.
        tests:
          - not_null
      - name: es_persona_juridica
        description: True si el NIF/CIF es de persona juridica o ens public (clau forta).
        tests:
          - not_null
      - name: instrument
        description: Instrument de l'ajuda (SUBVENCIÓN, GARANTÍA, PRÉSTAMO...).
        tests:
          - not_null
      - name: import_eur
        description: Import concedit en euros.
        tests:
          - not_null
      - name: ajuda_equivalent_eur
        description: Ajuda equivalent en euros (subsidi real en garanties/prestecs).
        tests:
          - not_null
