# El teler: projecte dbt sobre DuckDB.
name: "ordit"
version: "0.0.0"
config-version: 2

profile: "ordit"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Identificadors interns en angles (capa ordit). El renom a valencia ASCII
# es fa exactament a la capa marts, on la madeixa es torna teixit visible.
models:
  ordit:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

# Seeds de referencia geografica. Els codis (INE, postal) son text: mai integers, o
# perdrien els zeros inicials (p. ex. "03001").
seeds:
  ordit:
    +quote_columns: false
    dim_municipi:
      +column_types:
        codi_ine: varchar
    xwalk_cp_ine:
      +column_types:
        postal_code: varchar
        codi_ine: varchar
    xwalk_locality:
      +column_types:
        codi_ine: varchar
    dim_us_sigpac:
      +column_types:
        codi_us: varchar
    xwalk_catastro_ine:
      +column_types:
        catastro_code: varchar
        codi_ine: varchar
