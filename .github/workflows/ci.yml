name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # pytest amb gate de cobertura (>=70% sobre ingest/). test_staging construeix dbt
      # contra fixtures sintetiques: cap dada de persona fisica entra mai a CI.
      - run: uv run pytest --cov

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # dbt build contra les fixtures sintetiques (entitats ficticies); mai contra el
      # fitxer real, que viu al build plane local i no entra a git ni a CI.
      - name: dbt build (fixtures sintetiques)
        working-directory: ordit_dbt
        env:
          # A CI no existeix data/; la DuckDB efimera viu dins d'ordit_dbt.
          DUCKDB_PATH: ci.duckdb
        run: >
          uv run dbt build
          --profiles-dir .
          --vars "{fega_raw_glob: '../tests/fixtures/raw/Beneficiarios_municipio_ejercicio_financiero_*.utf8.txt', sigpac_agg_path: '../tests/fixtures/sigpac_agg_sample.csv', cooperatives_raw_glob: '../tests/fixtures/cooperatives_raw/*.jsonl'}"

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # Valida les fixtures sintetiques contra els contractes pydantic i comprova que cada
      # contracte porta la seua documentacio de procedencia.
      - run: uv run pytest tests/test_contracts.py tests/test_contracts_sigpac.py tests/test_provenance.py
