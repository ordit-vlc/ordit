name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # Fase 0: nomes verifiquem que el projecte compila (dbt parse).
      # Des de la Fase 1: dbt build contra una DuckDB xicoteta sembrada.
      - run: cd ordit_dbt && uv run dbt parse

  contracts:
    runs-on: ubuntu-latest
    steps:
      # No-op fins que existisca una mostra de la Fase 1 a tests/fixtures/.
      # Aleshores: validar els fitxers de mostra committejats contra els contractes pydantic.
      - run: 'echo "contracts: skip fins a la Fase 1 (encara no hi ha mostres de FEGA)."'
